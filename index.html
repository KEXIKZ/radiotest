<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Racing Controller</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --remote-bg: #1a1a1a;
            --accent-red: #e10600;
            --accent-green: #34c759;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(225, 6, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(225, 6, 0, 0.05) 1px, transparent 1px),
                linear-gradient(45deg, transparent 49%, rgba(255,255,255,0.02) 50%, transparent 51%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            user-select: none;
            overflow: hidden;
        }

        .f1-logo {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .f1-logo-icon {
            background: var(--accent-red);
            color: white;
            font-weight: 900;
            font-style: italic;
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 18px;
            letter-spacing: -1px;
            transform: skewX(-15deg);
        }

        .f1-logo-text {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .remote-body {
            background: var(--remote-bg);
            background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
            width: 230px;
            height: 500px;
            border-radius: 45px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 35px 20px;
            box-sizing: border-box;
            border: 2px solid #252525;
            z-index: 2;
        }

        .display-unit {
            width: 100%;
            height: 110px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 45px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        #channelDisplay {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .status-text {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            color: #888;
        }

        .indicator {
            width: 50px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-bottom: 25px;
            transition: 0.4s;
        }
        .indicator.recording { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); }
        .indicator.receiving { background: var(--accent-green); box-shadow: 0 0 15px var(--accent-green); }

        .nav-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .nav-btn {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            background: #252525;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.4);
        }

        .nav-btn:active { transform: scale(0.9); background: #333; }

        .ptt-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #151515);
            border: 4px solid #333;
            color: #666;
            font-weight: 900;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 15px 15px 30px #0a0a0a;
        }

        .ptt-btn.active {
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 0 0 20px rgba(225, 6, 0, 0.3);
        }

        .ptt-btn span { font-size: 22px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="f1-logo">
        <div class="f1-logo-icon">F1</div>
        <div class="f1-logo-text">Voice<br>Comm</div>
    </div>

    <div class="remote-body">
        <div class="indicator" id="statusLed"></div>
        
        <div class="display-unit">
            <div id="channelDisplay">CH 01</div>
            <div class="status-text" id="statusText">System Ready</div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" id="btnPrev">◂</button>
            <button class="nav-btn" id="btnNext">▸</button>
        </div>

        <button class="ptt-btn" id="pttBtn" disabled>
            <span>●</span>
            RADIO
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_QZSMUpUHm_1O5s37kLOoiLQTr0b1zmM",
            authDomain: "radio-39a77.firebaseapp.com",
            projectId: "radio-39a77",
            storageBucket: "radio-39a77.firebasestorage.app",
            messagingSenderId: "463975331029",
            appId: "1:463975331029:web:d0d1083e1da0b73b705e5c",
            measurementId: "G-CGW7DRSGRD",
            databaseURL: "https://radio-39a77-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myUserId = Math.random().toString(36).substring(2, 10);
        
        // Audio Context
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, duration, vol = 0.1, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let currentChannel = 1;
        let messagesRef, listener, mediaRecorder, isRecording = false, audioChunks = [];
        let sessionStartTime = Date.now(); // Время входа в канал

        const pttBtn = document.getElementById('pttBtn');
        const statusLed = document.getElementById('statusLed');
        const statusText = document.getElementById('statusText');
        const channelDisplay = document.getElementById('channelDisplay');

        // Функция смены канала
        function changeChannel(newChannel) {
            // Отписываемся от старого канала
            if (messagesRef && listener) off(messagesRef, 'child_added', listener);
            
            currentChannel = newChannel;
            sessionStartTime = Date.now(); // Обновляем время входа при смене канала
            channelDisplay.innerText = `CH 0${currentChannel}`;
            
            messagesRef = ref(db, `channels/${currentChannel}/messages`);
            
            // Подписка на новые сообщения
            listener = onChildAdded(messagesRef, (snap) => {
                const d = snap.val();
                
                // УСЛОВИЕ: проигрываем если отправил другой юзер И сообщение пришло ПОСЛЕ входа в канал
                if (d.senderId !== myUserId && d.timestamp > sessionStartTime) {
                    playAudio(d.audioData);
                }
            });
        }

        // Переключение каналов
        document.getElementById('btnNext').onclick = () => { changeChannel(currentChannel < 4 ? currentChannel + 1 : 1); };
        document.getElementById('btnPrev').onclick = () => { changeChannel(currentChannel > 1 ? currentChannel - 1 : 4); };
        
        changeChannel(1);

        // Инициализация микрофона
        navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
            pttBtn.disabled = false;
            mediaRecorder = new MediaRecorder(s);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                reader.onloadend = () => {
                    // Отправляем аудио + свой ID + серверное время
                    push(messagesRef, { 
                        senderId: myUserId, 
                        audioData: reader.result,
                        timestamp: Date.now() 
                    });
                };
                audioChunks = [];
            };
        });

        function playAudio(data) {
            statusLed.className = 'indicator receiving';
            statusText.innerText = "Receiving...";
            const a = new Audio(data);
            a.onended = () => { 
                statusLed.className = 'indicator'; 
                statusText.innerText = "System Ready"; 
            };
            a.play();
        }

        const start = () => { 
            if (!mediaRecorder || isRecording) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isRecording = true; 
            mediaRecorder.start(); 
            pttBtn.classList.add('active');
            statusLed.className = 'indicator recording'; 
            statusText.innerText = "Transmitting..."; 
        };

        const stop = () => { 
            if (!isRecording) return;
            isRecording = false; 
            mediaRecorder.stop(); 
            pttBtn.classList.remove('active');
            statusLed.className = 'indicator'; 
            statusText.innerText = "System Ready"; 
        };

        pttBtn.onmousedown = start;
        window.onmouseup = stop;
        pttBtn.ontouchstart = (e) => { e.preventDefault(); start(); };
        window.ontouchend = stop;
    </script>
</body>
</html>
